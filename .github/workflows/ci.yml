name: Build Check

on:
  - pull_request

jobs:
  check-pins:
    uses: tnoff/github-workflows/.github/workflows/check-action-pins.yml@06f676738efdf3f327af0059b3ce0c6f187e1b5c
  coverage:
    uses: tnoff/github-workflows/.github/workflows/coverage-check.yml@1dcefc7c5dfeb21105e3256bf21fc97b8552252e
    permissions:
      contents: read
      actions: read
      pull-requests: write
    with:
      coverage_source: dappertable
      install_command: pip install .[test]
      python_version: 3.14
  spellcheck:
      name: Spellcheck
      runs-on: ubuntu-24.04
      steps:
        - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        - uses: rojopolis/spellcheck-github-actions@e3cd8e9aec4587ec73bc0e60745aafd45c37aa2e
          name: Spellcheck
          with:
            config_path: .spellcheck/spellcheck.yml # put path to configuration file here
            task_name: Markdown
  build:
    name: Tox
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install tox tox-gh-actions
    - name: Test with tox
      run: tox -v
