[tox]
min_version = 4.0
env_list =
    py311
    py312
    py313
    py314

[testenv]
deps =
    .[test]
commands =
    py314: pylint dappertable/
    py314: bandit -r dappertable/
    pytest --cov=dappertable/ --cov-report=html --cov-report=xml --cov-fail-under=100 tests/

[pytest]
filterwarnings = error