include:
  - project: 'tnoff-projects/github-workflows'
    ref: 3dc971c41a156e3e17ce1824fb27c5b731b17433
    file: '/gitlab/tag.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 3dc971c41a156e3e17ce1824fb27c5b731b17433
    file: '/gitlab/discord-notify.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 3dc971c41a156e3e17ce1824fb27c5b731b17433
    file: '/gitlab/renovate.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 3dc971c41a156e3e17ce1824fb27c5b731b17433
    file: '/gitlab/bump-version.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 3dc971c41a156e3e17ce1824fb27c5b731b17433
    file: '/gitlab/trufflehog.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 3dc971c41a156e3e17ce1824fb27c5b731b17433
    file: '/gitlab/release.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 3dc971c41a156e3e17ce1824fb27c5b731b17433
    file: '/gitlab/spellcheck.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 3dc971c41a156e3e17ce1824fb27c5b731b17433
    file: '/gitlab/tox-pipeline.yml'

stages:
  - validate
  - test
  - tag
  - release
  - notify
  - renovate

default:
  tags:
    - self-hosted

bump-version:
  extends: .bump-version
  variables:
    GITLAB_PUSH_TOKEN: $RENOVATE_TOKEN
    BUMP_CHANGELOG: 'true'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^renovate\/dev-/

trufflehog:
  extends: .trufflehog
  stage: validate
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

spellcheck:
  extends: .spellcheck

tox-generate:
  extends: .tox-generate

tox-pipeline:
  extends: .tox-pipeline

tag-build:
  extends: .tag
  stage: tag
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

release:
  extends: .release
  stage: release
  needs:
    - job: tag-build
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

notify-mr:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_opened
    DISCORD_WEBHOOK_URL: $DISCORD_MR_WEBHOOK
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always

notify-tag-failure:
  extends: .discord-notify
  stage: notify
  needs: [tag-build]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_failure

notify-release-failure:
  extends: .discord-notify
  stage: notify
  needs: [release]
  allow_failure: true
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
    NOTIFY_MESSAGE: 'Release job failed'
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_failure

notify-renovate-failure:
  extends: .discord-notify
  stage: renovate
  needs: [renovate]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
    NOTIFY_MESSAGE: 'Renovate failed'
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_failure

notify-merged:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_merged
    DISCORD_WEBHOOK_URL: $DISCORD_MR_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: always

renovate:
  extends: .renovate
  stage: renovate
  variables:
    GITHUB_COM_TOKEN: $GITHUB_BOT_TOKEN
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
