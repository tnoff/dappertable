workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
    - if: $CI_PIPELINE_SOURCE == "schedule"

include:
  - project: 'tnoff-projects/github-workflows'
    ref: e48cecee88a1b534e38b799a6fcf1eb2e87e0d66
    file: '/gitlab/tag.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: e48cecee88a1b534e38b799a6fcf1eb2e87e0d66
    file: '/gitlab/discord-notify.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: e48cecee88a1b534e38b799a6fcf1eb2e87e0d66
    file: '/gitlab/renovate.yml'

stages:
  - validate
  - test
  - tag
  - notify
  - renovate

bump-version:
  stage: validate
  image: alpine:latest
  variables:
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git
  script:
    - |
      BASE_VERSION=$(git show "origin/main:VERSION" | tr -d '[:space:]')
      CURRENT_VERSION=$(cat VERSION | tr -d '[:space:]')

      if [ "$BASE_VERSION" != "$CURRENT_VERSION" ]; then
        echo "Version already bumped ($BASE_VERSION -> $CURRENT_VERSION), skipping"
        exit 0
      fi

      MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
      MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
      PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)
      NEW_VERSION="$MAJOR.$MINOR.$((PATCH+1))"
      echo "$NEW_VERSION" > VERSION

      git config user.email "ci@gitlab"
      git config user.name "GitLab CI"
      if [ -n "$GITLAB_PUSH_TOKEN" ]; then
        git remote set-url origin "https://deploy-token:${GITLAB_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      else
        git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      fi
      git add VERSION
      git commit -m "chore: bump patch version to $NEW_VERSION"
      git push origin "HEAD:$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^renovate\//

generate-tox:
  stage: validate
  image: python:3.14-slim
  before_script:
    - pip install tox
  script:
    - |
      python3 - <<'PYEOF'
      import re, subprocess

      result = subprocess.run(['tox', '-l'], capture_output=True, text=True, check=True)
      versions = []
      for env in result.stdout.strip().splitlines():
          m = re.fullmatch(r'py(\d)(\d+)', env)
          if m:
              versions.append(f'{m.group(1)}.{m.group(2)}')

      versions_yaml = '[' + ', '.join(f'"{v}"' for v in versions) + ']'
      lines = [
          'stages:',
          '  - test',
          '',
          'tox:',
          '  stage: test',
          f'  image: python:${{PYTHON_VERSION}}-slim',
          '  parallel:',
          '    matrix:',
          f'      - PYTHON_VERSION: {versions_yaml}',
          '  before_script:',
          '    - pip install tox',
          '  script:',
          "    - tox -e $(python3 -c \"import sys; v=sys.version_info; print(f'py{v.major}{v.minor}')\")",
          '  rules:',
          '    - when: always',
      ]
      with open('tox-pipeline.yml', 'w') as f:
          f.write('\n'.join(lines) + '\n')
      print('Generated tox-pipeline.yml:')
      print('\n'.join(lines))
      PYEOF
  artifacts:
    paths:
      - tox-pipeline.yml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"

tox-pipeline:
  stage: test
  needs: [generate-tox]
  trigger:
    include:
      - artifact: tox-pipeline.yml
        job: generate-tox
    strategy: depend
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"

diff-cover:
  stage: test
  image: python:3.14-slim
  variables:
    GIT_DEPTH: 0
  before_script:
    - apt-get update -qq && apt-get install -y -qq git
    - pip install .[test] diff-cover
  script:
    - pytest --cov=dappertable/ --cov-report=xml tests/
    - diff-cover coverage.xml --compare-branch=origin/main --fail-under=100
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

tag-build:
  extends: .tag
  stage: tag
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

notify-mr:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_opened
    DISCORD_WEBHOOK_URL: $DISCORD_MR_WEBHOOK
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always

notify-tag-failure:
  extends: .discord-notify
  stage: notify
  needs: [tag-build]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_failure

notify-merged:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_merged
    DISCORD_WEBHOOK_URL: $DISCORD_MR_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: always

renovate:
  extends: .renovate
  stage: renovate
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
