include:
  - project: 'tnoff-projects/github-workflows'
    ref: 63917bb6122f703890a7f7ee34b9a5ca55966ea2
    file: '/gitlab/tag.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 63917bb6122f703890a7f7ee34b9a5ca55966ea2
    file: '/gitlab/discord-notify.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 63917bb6122f703890a7f7ee34b9a5ca55966ea2
    file: '/gitlab/renovate.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 63917bb6122f703890a7f7ee34b9a5ca55966ea2
    file: '/gitlab/bump-version.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: 63917bb6122f703890a7f7ee34b9a5ca55966ea2
    file: '/gitlab/trufflehog.yml'

stages:
  - validate
  - test
  - tag
  - notify
  - renovate

default:
  tags:
    - self-hosted

bump-version:
  extends: .bump-version
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^renovate\/dev-/

trufflehog:
  extends: .trufflehog
  stage: validate
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

spellcheck:
  stage: validate
  image: docker.io/library/python:3.14-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq aspell aspell-en
    - pip install pyspelling
  script:
    - pyspelling -c .spellcheck/spellcheck.yml --name Markdown
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

generate-tox:
  stage: validate
  image: docker.io/library/python:3.14-slim
  before_script:
    - pip install tox
  script:
    - |
      python3 - <<'PYEOF'
      import re, subprocess

      result = subprocess.run(['tox', '-l'], capture_output=True, text=True, check=True)
      versions = []
      for env in result.stdout.strip().splitlines():
          m = re.fullmatch(r'py(\d)(\d+)', env)
          if m:
              versions.append(f'{m.group(1)}.{m.group(2)}')

      versions_yaml = '[' + ', '.join(f'"{v}"' for v in versions) + ']'
      # Pick the highest Python version as the canonical coverage producer for diff-cover.
      latest = max(versions, key=lambda v: tuple(int(p) for p in v.split('.')))
      lines = [
          'stages:',
          '  - test',
          '  - coverage',
          '',
          'default:',
          '  tags:',
          '    - self-hosted',
          '',
          'tox:',
          '  stage: test',
          f'  image: docker.io/library/python:${{PYTHON_VERSION}}-slim',
          '  parallel:',
          '    matrix:',
          f'      - PYTHON_VERSION: {versions_yaml}',
          '  before_script:',
          '    - pip install tox',
          '  script:',
          "    - tox -e $(python3 -c \"import sys; v=sys.version_info; print(f'py{v.major}{v.minor}')\")",
          '  artifacts:',
          '    paths:',
          '      - coverage.xml',
          '    expire_in: 1 day',
          '    when: always',
          '  rules:',
          '    - when: always',
          '',
          'diff-cover:',
          '  stage: coverage',
          f'  image: docker.io/library/python:{latest}-slim',
          '  needs:',
          f'    - job: "tox: [{latest}]"',
          '      artifacts: true',
          '  variables:',
          '    GIT_DEPTH: "0"',
          '  before_script:',
          '    - apt-get update -qq && apt-get install -y -qq git',
          '    - pip install diff-cover',
          '  script:',
          '    - diff-cover coverage.xml --compare-branch=origin/main --fail-under=100',
          '  rules:',
          '    - when: always',
      ]
      with open('tox-pipeline.yml', 'w') as f:
          f.write('\n'.join(lines) + '\n')
      print('Generated tox-pipeline.yml:')
      print('\n'.join(lines))
      PYEOF
  artifacts:
    paths:
      - tox-pipeline.yml
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

tox-pipeline:
  stage: test
  needs: [generate-tox]
  trigger:
    include:
      - artifact: tox-pipeline.yml
        job: generate-tox
    strategy: depend
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

tag-build:
  extends: .tag
  stage: tag
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_success

notify-mr:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_opened
    DISCORD_WEBHOOK_URL: $DISCORD_MR_WEBHOOK
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always

notify-tag-failure:
  extends: .discord-notify
  stage: notify
  needs: [tag-build]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: on_failure

notify-merged:
  extends: .discord-notify
  stage: notify
  needs: []
  variables:
    NOTIFY_TYPE: mr_merged
    DISCORD_WEBHOOK_URL: $DISCORD_MR_WEBHOOK
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE != "schedule"
      when: always

renovate:
  extends: .renovate
  stage: renovate
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
